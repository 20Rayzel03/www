<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Passwortlose SSH-Anmeldung">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1030" cy="90" r="180" fill="#38bdf8" opacity="0.16"/>
  <circle cx="130" cy="555" r="220" fill="#22c55e" opacity="0.12"/>

  <g filter="url(#shadow)">
    <rect x="95" y="115" width="1010" height="400" rx="36" fill="#0b1220" opacity="0.88"/>
    <rect x="130" y="150" width="940" height="330" rx="22" fill="#111827" stroke="#334155" stroke-width="2"/>
    <circle cx="165" cy="180" r="10" fill="#ef4444"/>
    <circle cx="198" cy="180" r="10" fill="#f59e0b"/>
    <circle cx="231" cy="180" r="10" fill="#22c55e"/>

    <text x="160" y="260" font-family="Consolas, Monaco, monospace" font-size="38" fill="#e2e8f0">$ ssh-keygen -t ed25519</text>
    <text x="160" y="322" font-family="Consolas, Monaco, monospace" font-size="34" fill="#38bdf8">ssh-ed25519 AAAA... Laptop</text>
    <text x="160" y="384" font-family="Consolas, Monaco, monospace" font-size="34" fill="#a7f3d0">authorized_keys ✓</text>
  </g>

  <g transform="translate(815 265)">
    <rect x="0" y="75" width="210" height="145" rx="22" fill="#f8fafc" opacity="0.95"/>
    <path d="M52 75V40C52 10 75 -12 105 -12s53 22 53 52v35" fill="none" stroke="#f8fafc" stroke-width="24" stroke-linecap="round"/>
    <circle cx="105" cy="142" r="22" fill="#0ea5e9"/>
    <rect x="97" y="160" width="16" height="36" rx="8" fill="#0ea5e9"/>
  </g>

  <text x="95" y="570" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="44" font-weight="800" fill="#f8fafc">Passwortlose SSH-Anmeldung</text>
  <text x="95" y="608" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" fill="#cbd5e1">Linux-Server sicher mit SSH-Key statt Passwort erreichen</text>
</svg>
