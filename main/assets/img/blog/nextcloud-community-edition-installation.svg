<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Nextcloud Community Edition installieren">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="48%" stop-color="#0f2a44"/>
      <stop offset="100%" stop-color="#0082c9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1000" cy="110" r="220" fill="#38bdf8" opacity="0.13"/>
  <circle cx="180" cy="555" r="240" fill="#22c55e" opacity="0.10"/>

  <g transform="translate(120 125)" filter="url(#shadow)">
    <rect width="960" height="360" rx="34" fill="#0f172a" opacity="0.92" stroke="#334155" stroke-width="2"/>
    <rect x="38" y="38" width="884" height="80" rx="20" fill="#111827"/>
    <circle cx="83" cy="78" r="13" fill="#0082c9"/>
    <circle cx="126" cy="78" r="13" fill="#22c55e"/>
    <circle cx="169" cy="78" r="13" fill="#f59e0b"/>
    <text x="215" y="88" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#e2e8f0">Nextcloud CE Setup</text>

    <g transform="translate(70 155)">
      <rect width="210" height="135" rx="22" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
      <text x="32" y="55" font-family="Consolas, Monaco, monospace" font-size="24" fill="#e2e8f0">Apache</text>
      <text x="32" y="95" font-family="Consolas, Monaco, monospace" font-size="24" fill="#93c5fd">PHP 8.3</text>
    </g>

    <g transform="translate(375 155)">
      <rect width="210" height="135" rx="22" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
      <ellipse cx="105" cy="45" rx="62" ry="24" fill="#22c55e" opacity="0.9"/>
      <rect x="43" y="45" width="124" height="50" fill="#22c55e" opacity="0.9"/>
      <ellipse cx="105" cy="95" rx="62" ry="24" fill="#16a34a"/>
      <text x="59" y="108" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="700" fill="#ecfdf5">MariaDB</text>
    </g>

    <g transform="translate(680 155)">
      <rect width="210" height="135" rx="22" fill="#1e293b" stroke="#f97316" stroke-width="2"/>
      <text x="40" y="55" font-family="Consolas, Monaco, monospace" font-size="24" fill="#fdba74">Redis</text>
      <text x="40" y="95" font-family="Consolas, Monaco, monospace" font-size="24" fill="#fde68a">APCu</text>
    </g>

    <path d="M282 222 H358" stroke="#64748b" stroke-width="5" stroke-linecap="round"/>
    <path d="M587 222 H663" stroke="#64748b" stroke-width="5" stroke-linecap="round"/>
  </g>

  <g transform="translate(860 335)">
    <circle cx="55" cy="55" r="42" fill="#0082c9"/>
    <circle cx="20" cy="72" r="30" fill="#0082c9"/>
    <circle cx="90" cy="72" r="30" fill="#0082c9"/>
    <rect x="20" y="55" width="70" height="48" rx="24" fill="#0082c9"/>
    <circle cx="55" cy="55" r="22" fill="#f8fafc"/>
  </g>

  <text x="95" y="560" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="42" font-weight="800" fill="#f8fafc">Nextcloud Community Edition</text>
  <text x="95" y="600" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" fill="#cbd5e1">Installation mit Apache, PHP, MariaDB, Redis und Reverse Proxy</text>
